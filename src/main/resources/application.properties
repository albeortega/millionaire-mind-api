spring.application.name=millionaire-mind-api

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:2}
spring.flyway.baseline-description=Existing Supabase schema

management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
app.gemini.api-url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
